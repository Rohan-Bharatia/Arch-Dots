$terminal = kitty
$browser = zen-browser
$text_editor = nvim
$file_manager = yazi
$osdclient = swayosd-client

$cursor_size = 24
$cursor_theme = hyprland_theme

$animation_theme = default

$inner_gap = 6
$outer_gap = 12
$workspace_gap = 12
$border_size = 2

$mouse_sensitivity = 0.1
$typing_disable_touchpad = true
$touchpad_sensitivity = 0.3

$window_rounding = 6
$window_rounding_power = 6
$active_opacity = 0.8
$inactive_opacity = 0.6
$fullscreen_opacity = 1

$enable_shadows = true
$shadow_range = 10
$shadow_power = 2
$shadow_offset = 0 0
$shadow_scale = 1

$enable_blur = true
$blur_size = 3
$blur_passes = 3
$blur_xray = true
$blur_vibrancy = 0.1696
$blur_popups = true
$blur_inputs = true

$workspace_swipe_fingers = 4
$gesture_fingers = 3
$gesture_fingers_more = 4

$main_mod = SUPER
